<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dotted World Map</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff;
    }

    h2 {
      margin-bottom: 10px;
    }

    .map-container {
      position: relative;
      display: inline-block;
      width: 900px;
      max-width: 100%;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .marker {
      fill: #007bff;
      stroke: #fff;
      stroke-width: 2;
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      background: #000;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
      white-space: nowrap;
      transform: translate(-50%, -120%);
    }
  </style>
</head>
<body>
  <h2>Get in touch with our team</h2>
  <p>We have the team and know-how to help you scale 10x faster.</p>

  <div class="map-container">
    <!-- Dotted world map SVG -->
    <svg viewBox="0 0 2000 1001" xmlns="http://www.w3.org/2000/svg">
      <image href="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_dots.svg" 
             width="2000" height="1001"/>
      <!-- Example markers -->
      <circle class="marker" cx="950" cy="400" r="10" data-name="London, UK"></circle>
      <circle class="marker" cx="1050" cy="420" r="10" data-name="Berlin, Germany"></circle>
      <circle class="marker" cx="750" cy="500" r="10" data-name="New York, USA"></circle>
      <circle class="marker" cx="1600" cy="700" r="10" data-name="Sydney, Australia"></circle>
    </svg>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <script>
    const markers = document.querySelectorAll(".marker");
    const tooltip = document.getElementById("tooltip");

    markers.forEach(marker => {
      marker.addEventListener("mouseenter", e => {
        tooltip.style.display = "block";
        tooltip.innerText = marker.getAttribute("data-name");
      });
      marker.addEventListener("mousemove", e => {
        tooltip.style.left = e.pageX + "px";
        tooltip.style.top = e.pageY + "px";
      });
      marker.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });
    });
  </script>
</body>
</html>
